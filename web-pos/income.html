<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Income and Expenses | Otterton's Point of Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="theme.css">
    <link rel="stylesheet" href="income.css">
    <script type="module" src="firebase-init.js"></script>
</head>
<body data-page="income">
    <div class="income-wrap">
        <header class="top-nav">
            <div class="logo-area">
                <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to dashboard">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="logo-text">
                    <h1>รายรับ-รายจ่าย</h1>
                    <p>Receipt history and reprint</p>
                </div>
            </div>
            <div class="service-status service-status-offline" id="serviceStatus">
                <span class="service-dot"></span>
                <span class="service-status-text">Print Service Offline</span>
            </div>
        </header>

        <main class="income-layout">
            <section class="income-panel">
                <div class="income-toolbar">
                    <div>
                        <h2>Recent Receipts</h2>
                        <p id="receiptSummary">Loading receipt history...</p>
                    </div>
                    <input id="receiptSearch" type="search" placeholder="Search receipt, feature tag, or item name">
                </div>
                <div class="receipt-list" id="receiptList"></div>
            </section>

            <aside class="income-panel receipt-detail" id="receiptDetail">
                <div class="empty-state">Select a receipt to view details.</div>
            </aside>
        </main>
    </div>

    <script type="module" src="income.js"></script>
    <script type="module" src="auth.js"></script>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
