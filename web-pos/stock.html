<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Management | Otterton's Point of Sale</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary-blue: #007bff;
            --bg-light-blue: #E7F3FF;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
            --card-radius: 20px;
            --border: #e2e8f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Prompt', sans-serif;
            background-color: var(--bg-light-blue);
            color: var(--text-dark);
            min-height: 100vh;
            padding: 32px;
        }

        .stock-wrap {
            max-width: 1180px;
            margin: 0 auto;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            gap: 12px;
            flex-wrap: wrap;
        }

        .top-nav-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .back-btn {
            background: white;
            border: none;
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: var(--card-shadow);
            color: var(--text-dark);
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: var(--primary-blue);
            color: white;
            transform: translateY(-1px);
        }

        .title-group h1 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .title-group p {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pill {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 9px 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            box-shadow: var(--card-shadow);
        }

        .layout {
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            align-items: start;
        }

        .panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid white;
            padding: 22px;
        }

        .panel h2 {
            font-size: 1.1rem;
            margin-bottom: 14px;
        }

        .table-wrap {
            overflow-x: auto;
            background: white;
            border-radius: var(--card-radius);
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 620px;
        }

        th,
        td {
            text-align: left;
            padding: 14px;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.9rem;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            background: #fafcff;
        }

        .stock-pill {
            display: inline-flex;
            align-items: center;
            padding: 4px 10px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 600;
        }

        .ok {
            background: #dcfce7;
            color: #166534;
        }

        .low {
            background: #fee2e2;
            color: #991b1b;
        }

        .action-btn {
            width: 100%;
            border: none;
            border-radius: 14px;
            padding: 12px;
            font-size: 0.92rem;
            font-weight: 600;
            background: var(--primary-blue);
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .action-btn:hover {
            opacity: 0.92;
        }

        .helper {
            margin-top: 10px;
            font-size: 0.82rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .form-grid {
            display: grid;
            gap: 10px;
            margin-top: 10px;
        }

        .form-grid input,
        .form-grid select {
            width: 100%;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            font-family: inherit;
            font-size: 0.9rem;
            background: white;
        }

        .muted-note {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .mini-btn {
            border: none;
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
        }

        .mini-btn.edit {
            background: #e0edff;
            color: #1d4ed8;
        }

        .mini-btn.delete {
            background: #fee2e2;
            color: #991b1b;
        }

        .empty-row {
            text-align: center;
            color: var(--text-muted);
            padding: 24px;
            font-style: italic;
        }

        @media (max-width: 980px) {
            body {
                padding: 16px;
            }

            .layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
    <link rel="stylesheet" href="theme.css">
</head>
<body data-page="stock">
    <div class="stock-wrap">
        <header class="top-nav">
            <div class="top-nav-left">
                <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to dashboard">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="title-group">
                    <h1>Stock Management</h1>
                    <p>Manage inventory levels and low-stock alerts</p>
                </div>
            </div>
            <div class="header-actions">
                <span class="pill">Demo View</span>
            </div>
        </header>

        <div class="layout">
            <section class="panel">
                <h2>Current Inventory</h2>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Item</th>
                                <th>Category</th>
                                <th>In Stock</th>
                                <th>Reorder Level</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            <tr>
                                <td colspan="6" class="empty-row">Loading inventory...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>

            <aside class="panel">
                <h2 id="formTitle">Add Stock Item</h2>
                <form id="stockForm" class="form-grid">
                    <input id="itemName" type="text" placeholder="Item name" maxlength="60" required>
                    <select id="itemCategory" required>
                        <option value="">Select category</option>
                        <option value="coffee">Coffee</option>
                        <option value="bakery">Bakery</option>
                        <option value="tea">Tea</option>
                    </select>
                    <input id="itemPrice" type="number" min="0" step="0.01" placeholder="Price (THB)" required>
                    <input id="itemStock" type="number" min="0" step="1" placeholder="In stock" required>
                    <input id="itemReorder" type="number" min="0" step="1" placeholder="Reorder level" required>
                    <input id="itemImage" type="url" placeholder="Image URL (optional)">
                    <button class="action-btn" type="submit" id="saveItemBtn">Save Item</button>
                    <button class="action-btn" type="button" id="cancelEditBtn" style="display:none;background:#64748b;">Cancel Edit</button>
                </form>
                <p class="muted-note">Changes sync live to POS menu from Firestore collection <b>products</b>.</p>
                <p class="helper" id="formStatus">Ready.</p>
            </aside>
        </div>
    </div>

    <script type="module" src="stock.js"></script>
    <script type="module" src="auth.js"></script>
</body>
</html>
