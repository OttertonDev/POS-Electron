<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otterton's Point of Sale | POS</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="pos-style.css">
    <link rel="stylesheet" href="theme.css">
    <script type="module" src="firebase-init.js"></script>
</head>
<body data-page="pos">
    <div class="dashboard-wrap pos-wrap">
        <header class="top-nav pos-top-nav">
            <div class="logo-area">
                <button class="back-btn" onclick="window.location.href='index.html'" aria-label="Back to dashboard">
                    <i data-lucide="arrow-left"></i>
                </button>
                <div class="logo-text">
                    <h1>POS Checkout</h1>
                    <p>Unified with dashboard style</p>
                </div>
            </div>
            <div class="top-actions">
                <div class="service-status service-status-offline" id="serviceStatus">
                    <span class="service-dot"></span>
                    <span class="service-status-text">Print Service Offline</span>
                </div>
                <span class="date-pill" id="currentDate">--/--/----</span>
            </div>
        </header>

        <div class="main-content pos-main-content">
            <aside class="nav-cards pos-categories-panel">
                <div class="panel-title-row">
                    <h3>Feature Tag Filter</h3>
                </div>
                <nav class="categories" id="featureTagFilterList" aria-label="Feature tag filter">
                    <button class="cat-btn active" type="button" data-tag-key="all">
                        <span class="icon">All Items</span>
                    </button>
                </nav>
            </aside>

            <main class="stats-section pos-products-panel">
                <div class="section-header pos-section-header">
                    <h2>Products</h2>
                    <div class="search-bar">
                        <input type="text" placeholder="Search menu items...">
                    </div>
                </div>

                <div class="products-grid" id="productGrid">
                    <!-- Products will be injected by JavaScript -->
                </div>
            </main>

            <section class="nav-card cart-area">
                <div class="panel-title-row">
                    <h3>Current Order</h3>
                </div>

                <div class="cart-items" id="cartList">
                    <div class="empty-cart">
                        <p>Order is empty</p>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (7%)</span>
                        <span id="tax">0.00</span>
                    </div>
                    <div class="total-row">
                        <span>Total Amount</span>
                        <span class="total-value" id="total">0.00</span>
                    </div>
                </div>

                <p class="checkout-note" id="checkoutNote">Print service must be online before the sale can complete.</p>

                <button class="btn-checkout" id="checkoutBtn" disabled>
                    Complete Sale
                </button>
            </section>
        </div>
    </div>

    <script type="module" src="pos-app.js"></script>
    <script type="module" src="auth.js"></script>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
