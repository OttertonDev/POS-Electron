<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vozy Premium POS | Smart Cafe System</title>
    <!-- Google Fonts: Inter for UI, Prompt for Thai context -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="pos-style.css">
    <!-- Firebase Initialization -->
    <script type="module" src="firebase-init.js"></script>
</head>
<body>
    <div class="dashboard-wrap pos-wrap">
        <header class="top-nav pos-top-nav">
            <div class="logo-area">
                <div class="logo-box">
                    <i data-lucide="receipt-text"></i>
                </div>
                <div class="logo-text">
                    <h1>POS Checkout</h1>
                    <p>Unified with dashboard style</p>
                </div>
            </div>
            <div class="top-actions">
                <span class="date-pill" id="currentDate">--/--/----</span>
            </div>
        </header>

        <div class="main-content pos-main-content">
            <aside class="nav-cards pos-categories-panel">
                <div class="panel-title-row">
                    <h3>Menu Categories</h3>
                </div>
                <nav class="categories">
                    <button class="cat-btn active" data-category="coffee">
                        <span class="icon">☕</span> Coffee
                    </button>
                    <button class="cat-btn" data-category="bakery">
                        <span class="icon">🥐</span> Bakery
                    </button>
                    <button class="cat-btn" data-category="tea">
                        <span class="icon">🍵</span> Tea
                    </button>
                </nav>

                <div class="sidebar-footer">
                    <div id="pluginStatus" class="status-indicator offline">
                        <span class="pulse"></span>
                        <span class="status-text">Plugin Offline</span>
                    </div>
                </div>
            </aside>

            <main class="stats-section pos-products-panel">
                <div class="section-header pos-section-header">
                    <h2>Products</h2>
                    <div class="search-bar">
                        <input type="text" placeholder="Search menu items...">
                    </div>
                </div>

                <div class="products-grid" id="productGrid">
                    <!-- Products will be injected by JavaScript -->
                </div>
            </main>

            <section class="nav-card cart-area">
                <div class="panel-title-row">
                    <h3>Current Order</h3>
                </div>

                <div class="cart-items" id="cartList">
                    <div class="empty-cart">
                        <img src="https://cdn-icons-png.flaticon.com/512/11329/11329060.png" alt="Empty Cart">
                        <p>Order is empty</p>
                    </div>
                </div>

                <div class="cart-summary">
                    <div class="summary-row">
                        <span>Subtotal</span>
                        <span id="subtotal">0.00</span>
                    </div>
                    <div class="summary-row">
                        <span>Tax (7%)</span>
                        <span id="tax">0.00</span>
                    </div>
                    <div class="total-row">
                        <span>Total Amount</span>
                        <span class="total-value" id="total">0.00</span>
                    </div>
                </div>

                <button class="btn-print" id="printBtn" disabled>
                    <span class="btn-icon">🖨️</span> Print Receipt
                </button>
            </section>
        </div>
    </div>

    <script type="module" src="pos-app.js"></script>
    <script>
        if (window.lucide) {
            lucide.createIcons();
        }
    </script>
</body>
</html>
