<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* CRITICAL THERMAL PRINTER SETTINGS */
    @page { margin: 0; } /* Eliminates OS print margins */
    
    body {
      margin: 0 auto;
      padding: 0;
      width: 182px; /* Protected exact safe-zone width */
      box-sizing: border-box;
      /* Using a highly legible Thai web font */
      font-family: 'Prompt', sans-serif;
      font-size: 13.5px; /* Slightly larger for clarity */
      color: #000;
      line-height: 1.35;
      /* Prevent anti-aliasing fuzziness on low DPI thermal printers */
      -webkit-font-smoothing: none;
    }

    .receipt-container {
      box-sizing: border-box;
      width: 100%;
      padding: 0 4px; /* Minimal side padding maximizes text area */
    }

    .header {
      text-align: center;
      margin-bottom: 10px;
    }

    .header-logo {
      font-weight: 600;
      font-size: 16px; /* Increased from 14px */
      margin-bottom: 5px;
    }

    .divider {
      border-top: 1px dashed #000;
      margin: 5px 0;
    }

    .item-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 3px;
    }
    
    .item-qty {
      width: 15%;
      margin-right: 2px;
    }
    .item-name {
      width: 55%;
    }
    .item-price {
      width: 30%;
      text-align: right;
    }

    .totals {
      margin-top: 5px;
      font-weight: 600;
    }

    .totals-row {
      display: flex;
      justify-content: space-between;
    }

    .footer {
      text-align: center;
      margin-top: 10px;
      font-size: 12px; /* Increased from 10px */
    }
  </style>
</head>
<body>
  <div class="receipt-container" id="receiptContent">
    <div class="header">
      <div class="header-logo" id="storeName">NIGGERS CAFE!</div>
      <div id="storeAddress">123 ถนนสุขุมวิท กรุงเทพฯ 10110</div>
      <div id="storePhone">โทร: 02-123-4567</div>
      <div style="font-size: 9px; margin-top: 3px;" id="receiptDate">วันที่: --/--/---- --:--</div>
    </div>

    <div class="divider"></div>

    <div id="itemList">
      <!-- Dynamic Items Will Appear Here -->
      <div class="item-row">
        <div class="item-qty">1x</div>
        <div class="item-name">Sample Item</div>
        <div class="item-price">0.00</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="totals">
      <div class="totals-row">
        <div>รวมเงิน (Total)</div>
        <div id="totalAmount">0.00</div>
      </div>
      <div class="totals-row" style="margin-top: 2px;">
        <div>เงินสด (Cash)</div>
        <div id="cashAmount">0.00</div>
      </div>
      <div class="totals-row">
        <div>เงินทอน (Change)</div>
        <div id="changeAmount">0.00</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="footer">
      <div id="footerMessage">ขอบคุณที่ใช้บริการค่ะ</div>
      <div>Please come again!</div>
    </div>
  </div>

  <script>
    /**
     * This function is called from the main process via executeJavaScript
     * to populate the receipt with real data.
     */
    window.renderReceipt = function(data) {
      if (!data) return;

      if (data.storeName) document.getElementById('storeName').innerText = data.storeName;
      if (data.address) document.getElementById('storeAddress').innerText = data.address;
      if (data.phone) document.getElementById('storePhone').innerText = 'โทร: ' + data.phone;
      
      const now = new Date();
      const dateStr = data.date || now.toLocaleDateString('th-TH') + ' ' + now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
      document.getElementById('receiptDate').innerText = 'วันที่: ' + dateStr;

      // Render Items
      const itemList = document.getElementById('itemList');
      if (data.items && Array.isArray(data.items)) {
        itemList.innerHTML = ''; // Clear samples
        data.items.forEach(item => {
          const row = document.createElement('div');
          row.className = 'item-row';
          row.innerHTML = `
            <div class="item-qty">${item.qty || '1x'}</div>
            <div class="item-name">${item.name || '---'}</div>
            <div class="item-price">${item.price || '0.00'}</div>
          `;
          itemList.appendChild(row);
        });
      }

      if (data.total) document.getElementById('totalAmount').innerText = data.total;
      if (data.cash) document.getElementById('cashAmount').innerText = data.cash;
      if (data.change) document.getElementById('changeAmount').innerText = data.change;
      if (data.footer) document.getElementById('footerMessage').innerText = data.footer;
    };
  </script>
</body>
</html>
