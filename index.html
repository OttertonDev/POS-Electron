<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otterton POS Desktop</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #1d4ed8;
      --border: #dbe3f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at top, #ffffff 0%, var(--bg) 58%);
      color: var(--text);
    }

    .panel {
      width: min(560px, 100%);
      padding: 32px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--panel);
      box-shadow: 0 20px 45px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
    }

    p {
      margin: 0;
      line-height: 1.6;
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      margin-top: 20px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #dbeafe;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>Printing Removed</h1>
    <p>
      This desktop app no longer exposes printer discovery, receipt printing, or local print APIs.
      It now acts only as a lightweight shell for the project.
    </p>
    <div class="badge">Print capability disabled</div>
  </main>
</body>
</html>
